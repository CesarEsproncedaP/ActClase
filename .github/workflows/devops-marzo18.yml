name: DevOps Pipeline - Marzo 18

on:
  push:
    branches: [ "main" ]
    paths:
      - "Marzo/18/**"
      - ".github/workflows/devops-marzo18.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Marzo/18

    steps:
      - name: Clonar repo
        uses: actions/checkout@v3

      - name: Construir imagen Docker
        run: docker build -t devops-app .

      - name: Ejecutar contenedor
        run: docker run -d -p 80:80 devops-app